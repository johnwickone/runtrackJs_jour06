<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>La Plateforme - Présence</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">La Plateforme_</a>
      <button id="logoutBtn" class="btn btn-light btn-sm d-none">Déconnexion</button>
    </div>
  </nav>

  <main class="container py-4">
    <section id="authSection" class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h3 text-center mb-3">Connexion / Inscription</h1>
            <div class="alert alert-info small">Email accepté : domaine <b>@laplateforme.io</b></div>
            <form id="authForm">
              <input class="form-control mb-2" id="name" placeholder="Nom complet" required>
              <input class="form-control mb-2" id="email" type="email" placeholder="email@laplateforme.io" required>
              <select class="form-select mb-3" id="role">
                <option value="student">Étudiant</option>
                <option value="moderator">Modérateur</option>
                <option value="admin">Administrateur</option>
              </select>
              <button class="btn btn-primary w-100">Entrer</button>
            </form>
            <p id="authError" class="text-danger mt-3 mb-0"></p>
          </div>
        </div>
      </div>
    </section>

    <section id="appSection" class="d-none">
      <div class="alert alert-success">Connecté : <b id="currentUser"></b></div>

      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4">Calendrier de présence</h2>
          <form id="requestForm" class="row g-2 align-items-end">
            <div class="col-md-8">
              <label class="form-label">Date demandée</label>
              <input id="dateInput" type="date" class="form-control" required>
            </div>
            <div class="col-md-4">
              <button class="btn btn-primary w-100">Demander l'autorisation</button>
            </div>
          </form>
          <p class="small text-muted mt-2">Une date passée ne peut plus être modifiée.</p>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h2 class="h4">Mes demandes</h2>
          <div class="table-responsive">
            <table class="table table-striped">
              <thead><tr><th>Date</th><th>Statut</th><th>Action</th></tr></thead>
              <tbody id="myRequests"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="backoffice" class="card mb-4 d-none">
        <div class="card-body">
          <h2 class="h4">Backoffice modérateur</h2>
          <div class="table-responsive">
            <table class="table table-bordered">
              <thead><tr><th>Nom</th><th>Email</th><th>Date</th><th>Statut</th><th>Actions</th></tr></thead>
              <tbody id="allRequests"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="adminPanel" class="card d-none">
        <div class="card-body">
          <h2 class="h4">Gestion des droits administrateur</h2>
          <form id="rightsForm" class="row g-2 mb-3">
            <div class="col-md-7"><input id="rightsEmail" type="email" class="form-control" placeholder="email@laplateforme.io" required></div>
            <div class="col-md-3">
              <select id="rightsRole" class="form-select">
                <option value="student">Étudiant</option>
                <option value="moderator">Modérateur</option>
                <option value="admin">Administrateur</option>
              </select>
            </div>
            <div class="col-md-2"><button class="btn btn-warning w-100">Modifier</button></div>
          </form>
          <ul id="usersList" class="list-group"></ul>
        </div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
