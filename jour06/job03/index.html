<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job 03 - Grille Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .bloc{min-height:70px;border:6px solid #fff}.cyan{background:#96dce8}.blue{background:#98afea}.purple{background:#c88ee8}.salmon{background:#efa28d}.small{min-height:35px}.big{min-height:120px}
  </style>
</head>
<body class="bg-light">
  <main class="container py-5">
    <h1 class="text-center mb-4">Job 03 - Grille Bootstrap</h1>
    <div class="border border-info p-3 bg-white">
      <div class="row">
        <div class="col-12"><div class="bloc cyan"></div></div>
      </div>
      <div class="row">
        <div class="col-12 col-md-4"><div class="bloc blue big"></div></div>
        <div class="col-12 col-md-4"><div class="bloc blue big"></div></div>
        <div class="col-12 col-md-4"><div class="bloc blue big"></div></div>
      </div>
      <div class="row">
        <div class="col-12 col-md-8"><div class="bloc purple"></div></div>
        <div class="col-12 col-md-4"><div class="bloc purple"></div></div>
      </div>
      <div class="row justify-content-between text-center">
        <div class="col-4 col-md-2"><div class="bloc salmon small"></div></div>
        <div class="col-4 col-md-2"><div class="bloc salmon small"></div></div>
        <div class="col-4 col-md-2"><div class="bloc salmon small"></div></div>
      </div>
    </div>
  </main>
</body>
</html>
